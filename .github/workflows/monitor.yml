name: Damai Ticket Monitor

on:
  schedule:
    # Triggers every 5 minutes within Shanghai 09:00–20:00. Shanghai is UTC+8,
    # so 09:00 CST = 01:00 UTC and 19:55 CST = 11:55 UTC. The last trigger is
    # 11:55 UTC (19:55 CST); the 20:00 CST run would be skipped by main.py's
    # run window anyway, so we stop one hour earlier to avoid wasted minutes.
    # Before July 20: one check per trigger (every 5 minutes).
    # July 20–31: each trigger runs 5-minute internal polling with 1-minute
    # checks, giving effective 1-minute granularity. This transition is handled
    # inside main.py (should_use_polling_mode / run_polling).
    - cron: "*/5 1-11 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Polling runs last ~5 minutes and the cron fires every 5 minutes, so two
# runs can overlap and race on state.json (duplicate notifications). Only one
# run per group is allowed at a time; queued runs wait, never cancel, so a
# late-arriving run still commits state before the next begins.
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          CONCERT_KEYWORD: ${{ secrets.CONCERT_KEYWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WECHAT_TOKEN: ${{ secrets.WECHAT_TOKEN }}
          WECHAT_PROVIDER: ${{ secrets.WECHAT_PROVIDER }}
        run: python main.py

      - name: Commit state changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update state.json [skip ci]"
          git push
